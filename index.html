<!DOCTYPE html>
<html>

<head>
  <meta name="description" content="Snake Experiment" />
  <meta charset=utf-8 />
  <title>I Hate Snakes</title>
  <link rel="stylesheet" type="text/css" href="css/main.css">
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <h1>random snake</h1>

      <div class="control-group">
        <button id="play">play</button>
        <button id="pause">pause</button>
        <button id="reset">reset</button>
      </div>

      <div class="control-group">
        <label for="tail">tail length</label>
        <input id="tail" type="range" min=1 max=200 value=4>

        <label for="freq">frequency</label>
        <input id="freq" type="range" min=1 max=1000 value=1>

        <label for="pixel">pixel size</label>
        <input id="pixel" type="range" min=1 max=50 value=36>

        <label for="width">width</label>
        <input id="width" type="range" min=1 max=50 value=15>

        <label for="height">height</label>
        <input id="height" type="range" min=1 max=50 value=15>

        <label class="checkbox-label"><input id="random" type="checkbox" checked> random direction</label>
        <label class="checkbox-label"><input id="selfcollide" type="checkbox"> self-collision</label>
      </div>
    </aside>

    <main class="canvas-area">
      <canvas id="canvas" width="300" height="300"></canvas>
    </main>
  </div>
  <script src='bower_components/requirejs/require.js' data-main='js/app'></script>
</body>

</html>
